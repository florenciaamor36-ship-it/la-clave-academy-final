<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Clave Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --surface: #111111; --accent: #ff0000; --text: #ffffff; --text-dim: #888888; --border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        nav { padding: 30px; text-align: center; border-bottom: 1px solid var(--border); font-family: 'Montserrat'; font-weight: 900; font-size: 1.5rem; }
        nav span { color: var(--accent); }
        header { padding: 100px 20px 60px; text-align: center; max-width: 900px; margin: 0 auto; }
        header h1 { font-family: 'Montserrat'; font-weight: 900; font-size: 4rem; line-height: 1; margin-bottom: 20px; }
        header h1 span { color: var(--accent); }
        header p { color: var(--text-dim); font-size: 1.4rem; margin-bottom: 50px; }
        .box { padding: 25px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; max-width: 600px; margin: 0 auto; font-size: 1.2rem; }
    </style>
</head>
<body>
    <nav>LA CLAVE <span>ACADEMY</span></nav>
    <header>
        <h1>EL MOTOR DE<br><span>EDUCACIÓN ÉLITE</span></h1>
        <p>Más de 65,000 cursos certificados sin costo.</p>
        <div class="box">¿Qué quieres dominar hoy?</div>
    </header>
</body>
</html>
